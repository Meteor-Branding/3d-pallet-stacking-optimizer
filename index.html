<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="appTitle">3D 最佳化棧板堆疊計算器 (多棧板版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            background: #f0f0f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.05);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>

<body>

    <!-- Language Selector -->
    <div class="fixed top-4 right-4 z-50 bg-white/95 backdrop-blur px-3 py-2 rounded-lg shadow-md border border-gray-100 flex items-center gap-2 transition-transform hover:scale-105"
        id="langSelectorContainer">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
        </svg>
        <select id="langSelect" onchange="setLanguage(this.value)"
            class="bg-transparent border-none outline-none text-sm font-medium text-gray-700 cursor-pointer">
            <option value="zh">繁體中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <!-- Control Panel -->
    <div class="fixed top-0 left-0 h-full w-80 glass-panel z-10 flex flex-col transition-transform duration-300 transform translate-x-0"
        id="sidebar">
        <div class="p-5 border-b border-gray-200 bg-gray-50">
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2" data-i18n="titleMain">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
                棧板堆疊計算器
            </h1>
            <p class="text-xs text-gray-500 mt-1" data-i18n="titleSub">輸入尺寸以計算最佳堆疊方案</p>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">

            <!-- Pallet Settings -->
            <div class="space-y-3">
                <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wider border-b pb-1"
                    data-i18n="sectionPallet">1. 棧板設定 (cm)</h2>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1" data-i18n="labelLength">長度 (L)</label>
                        <input type="number" id="palletL" value="120"
                            class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                            min="1">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1" data-i18n="labelWidth">寬度 (W)</label>
                        <input type="number" id="palletW" value="100"
                            class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                            min="1">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1" data-i18n="labelHeight">高度 (H)</label>
                        <input type="number" id="palletH" value="15"
                            class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                            min="1">
                    </div>
                    <div class="col-span-3">
                        <label class="block text-xs text-gray-500 mb-1" data-i18n="labelMaxHeight">含棧板最大高度限制
                            (總高)</label>
                        <input type="number" id="maxH" value="200"
                            class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                            min="1">
                    </div>
                </div>
                <button onclick="addPalletType()"
                    class="w-full py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded text-sm font-medium transition-colors flex justify-center items-center gap-1">
                    <span class="text-lg">+</span> <span data-i18n="btnAddPallet">新增棧板至清單</span>
                </button>
            </div>

            <!-- Pallet List -->
            <div class="space-y-2">
                <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wider border-b pb-1"
                    data-i18n="listPalletTitle">可用棧板清單</h2>
                <div id="palletListContainer" class="space-y-2 min-h-[50px]">
                    <div class="text-xs text-gray-400 text-center italic p-2" data-i18n="noPallets">尚未加入棧板</div>
                </div>
            </div>

            <!-- Box Settings -->
            <div class="space-y-3">
                <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wider border-b pb-1"
                    data-i18n="sectionBox">2. 新增箱子 (cm)</h2>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-xs text-gray-500" data-i18n="labelL">長</label>
                        <input type="number" id="boxL" value="40" class="w-full p-1 border rounded text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500" data-i18n="labelW">寬</label>
                        <input type="number" id="boxW" value="30" class="w-full p-1 border rounded text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500" data-i18n="labelH">高</label>
                        <input type="number" id="boxH" value="25" class="w-full p-1 border rounded text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 items-center">
                    <div>
                        <label class="block text-xs text-gray-500" data-i18n="labelQty">數量</label>
                        <input type="number" id="boxQty" value="25" class="w-full p-1 border rounded text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500" data-i18n="labelColor">顏色</label>
                        <input type="color" id="boxColor" value="#3B82F6"
                            class="w-full h-8 p-0 border rounded cursor-pointer">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1" data-i18n="labelTargetPallet">指定棧板 (可選)</label>
                    <select id="boxTargetPallet" class="w-full p-1 border rounded text-sm text-gray-700 bg-white">
                        <option value="" data-i18n="autoArrange">自動安排</option>
                    </select>
                </div>
                <!-- New Option: This side up -->
                <div class="flex items-center gap-2 py-1">
                    <input type="checkbox" id="boxOnlyUp"
                        class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 border-gray-300">
                    <label for="boxOnlyUp" class="text-sm text-gray-700"><span data-i18n="labelThisSideUp">限制此面朝上</span>
                        <span class="text-xs text-gray-400" data-i18n="labelNoRotate">(不可倒放/側放)</span></label>
                </div>

                <button onclick="addBoxType()"
                    class="w-full py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded text-sm font-medium transition-colors flex justify-center items-center gap-1">
                    <span class="text-lg">+</span> <span data-i18n="btnAddBox">新增至清單</span>
                </button>
            </div>

            <!-- Box List -->
            <div class="space-y-2">
                <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wider border-b pb-1"
                    data-i18n="listBoxTitle">待裝箱清單</h2>
                <div id="boxListContainer" class="space-y-2 min-h-[100px]">
                    <!-- Dynamic Items -->
                    <div class="text-xs text-gray-400 text-center italic p-2" data-i18n="noBoxes">尚未加入箱子</div>
                </div>
            </div>

        </div>

        <!-- Action Buttons -->
        <div class="p-5 border-t border-gray-200 bg-white space-y-3">
            <button onclick="calculatePacking()"
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-lg font-bold transition-transform transform active:scale-95 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span data-i18n="btnStartCalc">開始多棧板計算</span>
            </button>
            <button onclick="resetScene()"
                class="w-full py-2 bg-white border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg text-sm font-medium"
                data-i18n="btnReset">
                重置場景
            </button>
        </div>
    </div>

    <!-- Toggle Button for Mobile/Small screens -->
    <button onclick="toggleSidebar()" class="fixed top-4 left-4 z-20 bg-white p-2 rounded-full shadow-md md:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <!-- Results & Navigation Overlay -->
    <div id="resultsOverlay"
        class="fixed top-16 right-4 bg-white/95 backdrop-blur p-4 rounded-lg shadow-lg z-10 hidden w-64 border border-gray-100">
        <div class="mb-4 border-b pb-2">
            <h3 class="font-bold text-gray-800 text-lg" data-i18n="resultsTitle">計算結果</h3>
            <div class="text-xs text-gray-500 mt-1"><span data-i18n="totalPallets">需總棧板數:</span> <span
                    id="totalPalletsCount" class="text-blue-600 font-bold text-base">0</span></div>
            <div class="text-xs text-gray-500"><span data-i18n="failedToPack">未成功裝載:</span> <span id="globalFailedCount"
                    class="text-red-500 font-bold">0</span> <span data-i18n="tooLarge">(尺寸過大)</span></div>
        </div>

        <!-- Pallet Navigation -->
        <div class="flex items-center justify-between mb-4 bg-gray-50 p-2 rounded">
            <button onclick="switchPallet(-1)" id="prevPalletBtn"
                class="p-1 rounded hover:bg-gray-200 text-gray-600 disabled:opacity-30 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="text-center">
                <div class="text-xs text-gray-400 uppercase font-bold" data-i18n="currentView">目前檢視</div>
                <div class="font-bold text-blue-700"><span data-i18n="palletNumPrefix">棧板</span> <span
                        id="currentPalletNum">1</span></div>
            </div>
            <button onclick="switchPallet(1)" id="nextPalletBtn"
                class="p-1 rounded hover:bg-gray-200 text-gray-600 disabled:opacity-30 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>

        <!-- Current Pallet Stats -->
        <div class="text-sm space-y-1">
            <div class="font-semibold text-gray-700 border-b pb-1 mb-1" data-i18n="palletDetails">本棧板詳情</div>
            <div class="flex justify-between"><span data-i18n="boxesPacked">箱數:</span> <span id="resPacked"
                    class="font-mono text-green-600 font-bold">0</span></div>
            <div class="flex justify-between"><span data-i18n="stackHeight">堆疊高度:</span> <span><span id="resHeight"
                        class="font-mono font-bold">0</span> cm</span></div>
            <div class="flex justify-between"><span data-i18n="volumeUtil">空間利用率:</span> <span id="resVol"
                    class="font-mono text-blue-600 font-bold">0%</span></div>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <script>
        // --- i18n Dictionary ---
        const translations = {
            zh: {
                appTitle: "3D 最佳化棧板堆疊計算器 (多棧板版)",
                titleMain: `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
                棧板堆疊計算器`,
                titleSub: "輸入尺寸以計算最佳堆疊方案",
                sectionPallet: "1. 棧板設定 (cm)",
                labelLength: "長度 (L)",
                labelWidth: "寬度 (W)",
                labelHeight: "高度 (H)",
                labelMaxHeight: "含棧板最大高度限制 (總高)",
                btnAddPallet: "新增棧板至清單",
                listPalletTitle: "可用棧板清單",
                noPallets: "尚未加入棧板",
                sectionBox: "2. 新增箱子 (cm)",
                labelL: "長",
                labelW: "寬",
                labelH: "高",
                labelQty: "數量",
                labelColor: "顏色",
                labelTargetPallet: "指定棧板 (可選)",
                autoArrange: "自動安排",
                labelThisSideUp: "限制此面朝上",
                labelNoRotate: "(不可倒放/側放)",
                btnAddBox: "新增至清單",
                listBoxTitle: "待裝箱清單",
                noBoxes: "尚未加入箱子",
                btnStartCalc: "開始多棧板計算",
                btnReset: "重置場景",
                resultsTitle: "計算結果",
                totalPallets: "需總棧板數:",
                failedToPack: "未成功裝載:",
                tooLarge: "(尺寸過大)",
                currentView: "目前檢視",
                palletNumPrefix: "棧板",
                palletDetails: "本棧板詳情",
                boxesPacked: "箱數:",
                stackHeight: "堆疊高度:",
                volumeUtil: "空間利用率:",
                errValidDim: "請輸入有效的正整數尺寸",
                errValidDimQty: "請輸入有效的正整數尺寸和數量",
                errAddPalletFirst: "請先至少新增一種棧板尺寸至清單",
                errAddBoxFirst: "請先至少新增一種箱子至清單",
                errFailedPack: "無法裝載任何箱子 (可能是箱子比棧板大)",
                palletStr: "棧板",
                maxTotalHeight: "最大總高:",
                heightStr: "高:",
                thisSideUpHover: "此面朝上",
                qtyStr: "數量:",
                targetPalletStr: "指定棧板:"
            },
            en: {
                appTitle: "3D Optimized Pallet Packing Calculator",
                titleMain: `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                </svg>
                Pallet Packing Calculator`,
                titleSub: "Enter dimensions to calculate optimal packing",
                sectionPallet: "1. Pallet Settings (cm)",
                labelLength: "Length (L)",
                labelWidth: "Width (W)",
                labelHeight: "Height (H)",
                labelMaxHeight: "Max Total Height (incl. pallet)",
                btnAddPallet: "Add Pallet to List",
                listPalletTitle: "Available Pallets",
                noPallets: "No pallets added yet",
                sectionBox: "2. Add Box (cm)",
                labelL: "Length",
                labelW: "Width",
                labelH: "Height",
                labelQty: "Qty",
                labelColor: "Color",
                labelTargetPallet: "Target Pallet (Optional)",
                autoArrange: "Auto Arrange",
                labelThisSideUp: "This side up",
                labelNoRotate: "(No rotate/tilt)",
                btnAddBox: "Add to List",
                listBoxTitle: "Boxes to Pack",
                noBoxes: "No boxes added yet",
                btnStartCalc: "Start Calculation",
                btnReset: "Reset Scene",
                resultsTitle: "Results",
                totalPallets: "Total Pallets:",
                failedToPack: "Failed to Pack:",
                tooLarge: "(Too large)",
                currentView: "Current View",
                palletNumPrefix: "Pallet",
                palletDetails: "Pallet Details",
                boxesPacked: "Boxes:",
                stackHeight: "Stack Height:",
                volumeUtil: "Volume Util:",
                errValidDim: "Please enter valid positive dimensions",
                errValidDimQty: "Please enter valid positive dimensions and quantity",
                errAddPalletFirst: "Please add at least one pallet type first",
                errAddBoxFirst: "Please add at least one box type first",
                errFailedPack: "Failed to pack any box (possibly box is larger than pallet)",
                palletStr: "Pallet",
                maxTotalHeight: "Max Height:",
                heightStr: "H:",
                thisSideUpHover: "This side up",
                qtyStr: "Qty:",
                targetPalletStr: "Target Pallet:"
            }
        };

        let currentLang = 'zh';

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    if (key === 'titleMain') {
                        el.innerHTML = translations[lang][key];
                    } else {
                        el.textContent = translations[lang][key];
                    }
                }
            });

            // Re-render dynamic lists to apply new language
            renderPalletList();
            renderBoxList();
        }

        // --- State Management ---
        let palletTypes = [];
        let boxTypes = [];
        let scene, camera, renderer, controls;
        let palletMesh, boxMeshes = [];

        // Multi-pallet state
        let allPalletsData = []; // Array of objects { config, boxes }
        let currentPalletIndex = 0;

        // --- 3D Initialization ---
        function init3D() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f2f5);
            scene.fog = new THREE.Fog(0xf0f2f5, 200, 1000);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.set(300, 300, 300);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; // Prevent going below ground

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(200, 400, 200);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // Grid & Ground
            const gridHelper = new THREE.GridHelper(1000, 50, 0xcccccc, 0xe5e5e5);
            scene.add(gridHelper);

            const groundGeometry = new THREE.PlaneGeometry(2000, 2000);
            const groundMaterial = new THREE.MeshPhongMaterial({ color: 0xf0f2f5, depthWrite: false });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Initial Visuals
            updatePalletVisuals({ l: 120, w: 100, h: 15 });

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // --- Logic: Pallet Management ---
        function addPalletType() {
            const l = parseFloat(document.getElementById('palletL').value);
            const w = parseFloat(document.getElementById('palletW').value);
            const h = parseFloat(document.getElementById('palletH').value);
            const maxH = parseFloat(document.getElementById('maxH').value);

            if (l <= 0 || w <= 0 || h <= 0 || maxH <= 0) {
                alert(t('errValidDim'));
                return;
            }

            const id = Date.now();
            palletTypes.push({ id, l, w, h, maxH });
            renderPalletList();

            // Default visual to the last added pallet
            updatePalletVisuals(palletTypes[palletTypes.length - 1]);
        }

        function removePalletType(id) {
            palletTypes = palletTypes.filter(p => p.id !== id);
            renderPalletList();
        }

        function updatePalletSelectOptions() {
            const select = document.getElementById('boxTargetPallet');
            if (!select) return;
            const currentValue = select.value;

            let optionsHtml = `<option value="">${t('autoArrange')}</option>`;
            palletTypes.forEach((p, index) => {
                optionsHtml += `<option value="${p.id}">${t('palletStr')} #${index + 1} (${p.l}x${p.w})</option>`;
            });

            select.innerHTML = optionsHtml;
            if (palletTypes.find(p => p.id.toString() === currentValue)) {
                select.value = currentValue;
            }
        }

        function renderPalletList() {
            updatePalletSelectOptions();
            const container = document.getElementById('palletListContainer');
            if (palletTypes.length === 0) {
                container.innerHTML = `<div class="text-xs text-gray-400 text-center italic p-2">${t('noPallets')}</div>`;
                return;
            }

            container.innerHTML = palletTypes.map((p, index) => `
                <div class="flex items-center justify-between bg-white p-2 rounded border border-gray-200 shadow-sm text-sm">
                    <div class="flex items-center gap-2">
                        <div class="font-bold text-gray-700 bg-gray-100 px-2 py-1 rounded">#${index + 1}</div>
                        <div>
                            ${p.isEditing ? `
                            <div class="font-bold text-gray-700 flex items-center gap-1">
                                <input type="number" value="${p.l}" onchange="updatePallet(${p.id}, 'l', this.value)" class="w-14 p-1 border rounded text-xs font-normal"> x 
                                <input type="number" value="${p.w}" onchange="updatePallet(${p.id}, 'w', this.value)" class="w-14 p-1 border rounded text-xs font-normal"> x 
                                <input type="number" value="${p.h}" onchange="updatePallet(${p.id}, 'h', this.value)" class="w-14 p-1 border rounded text-xs font-normal">
                            </div>
                            <div class="text-xs text-gray-500 mt-1 flex items-center gap-1">
                                ${t('maxTotalHeight')} 
                                <input type="number" value="${p.maxH}" onchange="updatePallet(${p.id}, 'maxH', this.value)" class="w-14 p-1 border rounded text-xs">
                            </div>
                            ` : `
                            <div class="font-bold text-gray-700 flex items-center gap-1">
                                ${p.l} x ${p.w} x ${p.h}
                            </div>
                            <div class="text-xs text-gray-500 mt-1 flex items-center gap-1">
                                ${t('maxTotalHeight')} ${p.maxH}
                            </div>
                            `}
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="toggleEditPallet(${p.id})" class="text-blue-400 hover:text-blue-600 p-1">
                            ${p.isEditing ? `
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                            ` : `
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                            `}
                        </button>
                        <button onclick="removePalletType(${p.id})" class="text-red-400 hover:text-red-600 p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleEditPallet(id) {
            const pallet = palletTypes.find(p => p.id === id);
            if (pallet) {
                pallet.isEditing = !pallet.isEditing;
                renderPalletList();
            }
        }

        function updatePallet(id, field, value) {
            const val = parseFloat(value);
            if (isNaN(val) || val <= 0) {
                alert(t('errValidDim'));
                renderPalletList();
                return;
            }
            const pallet = palletTypes.find(p => p.id === id);
            if (pallet) {
                pallet[field] = val;
                if (palletTypes.indexOf(pallet) === palletTypes.length - 1) {
                    updatePalletVisuals(pallet);
                }
                updatePalletSelectOptions();
            }
        }

        function updateBox(id, field, value) {
            const val = parseFloat(value);
            if (isNaN(val) || val <= 0) {
                alert(t('errValidDimQty'));
                renderBoxList();
                return;
            }
            const box = boxTypes.find(b => b.id === id);
            if (box) {
                box[field] = val;
                if (field === 'l' || field === 'w') {
                    if (box.l < box.w) {
                        let temp = box.l;
                        box.l = box.w;
                        box.w = temp;
                        renderBoxList();
                    }
                }
            }
        }

        function addBoxType() {
            let l = parseFloat(document.getElementById('boxL').value);
            let w = parseFloat(document.getElementById('boxW').value);
            const h = parseFloat(document.getElementById('boxH').value);
            const qty = parseInt(document.getElementById('boxQty').value);
            const color = document.getElementById('boxColor').value;
            const onlyUp = document.getElementById('boxOnlyUp').checked;
            const targetPalletId = document.getElementById('boxTargetPallet').value;

            if (l <= 0 || w <= 0 || h <= 0 || qty <= 0) {
                alert(t('errValidDimQty'));
                return;
            }

            // Auto-swap L and W if L < W
            if (l < w) {
                let temp = l;
                l = w;
                w = temp;
                document.getElementById('boxL').value = l;
                document.getElementById('boxW').value = w;
            }

            const id = Date.now();
            boxTypes.push({ id, l, w, h, qty, color, onlyUp, targetPalletId });
            renderBoxList();

            // Generate random color for next input
            document.getElementById('boxColor').value = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        }

        function removeBoxType(id) {
            boxTypes = boxTypes.filter(b => b.id !== id);
            renderBoxList();
        }

        function renderBoxList() {
            const container = document.getElementById('boxListContainer');
            if (boxTypes.length === 0) {
                container.innerHTML = `<div class="text-xs text-gray-400 text-center italic p-2">${t('noBoxes')}</div>`;
                return;
            }

            container.innerHTML = boxTypes.map(b => `
                <div class="flex items-center justify-between bg-white p-2 rounded border border-gray-200 shadow-sm text-sm">
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded-full border border-gray-300 flex-shrink-0" style="background-color: ${b.color}"></div>
                        <div>
                            ${b.isEditing ? `
                            <div class="font-bold text-gray-700 flex items-center gap-1 flex-wrap">
                                <input type="number" value="${b.l}" onchange="updateBox(${b.id}, 'l', this.value)" class="w-12 p-1 border rounded text-xs font-normal"> x 
                                <input type="number" value="${b.w}" onchange="updateBox(${b.id}, 'w', this.value)" class="w-12 p-1 border rounded text-xs font-normal"> x 
                                <input type="number" value="${b.h}" onchange="updateBox(${b.id}, 'h', this.value)" class="w-12 p-1 border rounded text-xs font-normal">
                                ${b.onlyUp ? `<span title="${t('thisSideUpHover')}" class="bg-blue-100 text-blue-600 text-[10px] px-1 rounded border border-blue-200 cursor-help ml-1">⬆ ${t('thisSideUpHover')}</span>` : ''}
                            </div>
                            <div class="text-xs text-gray-500 mt-1 flex items-center gap-1 flex-wrap">
                                ${t('qtyStr')} 
                                <input type="number" value="${b.qty}" onchange="updateBox(${b.id}, 'qty', this.value)" class="w-14 p-1 border rounded text-xs"> 
                                <span class="ml-1 px-1 rounded bg-gray-100 border border-gray-200">
                                    ${b.targetPalletId ? `${t('targetPalletStr')} #${palletTypes.findIndex(p => p.id.toString() === b.targetPalletId) + 1}` : t('autoArrange')}
                                </span>
                            </div>
                            ` : `
                            <div class="font-bold text-gray-700 flex items-center gap-1 flex-wrap">
                                ${b.l} x ${b.w} x ${b.h}
                                ${b.onlyUp ? `<span title="${t('thisSideUpHover')}" class="bg-blue-100 text-blue-600 text-[10px] px-1 rounded border border-blue-200 cursor-help ml-1">⬆ ${t('thisSideUpHover')}</span>` : ''}
                            </div>
                            <div class="text-xs text-gray-500 mt-1 flex items-center gap-1 flex-wrap">
                                ${t('qtyStr')} ${b.qty} 
                                <span class="ml-1 px-1 rounded bg-gray-100 border border-gray-200">
                                    ${b.targetPalletId ? `${t('targetPalletStr')} #${palletTypes.findIndex(p => p.id.toString() === b.targetPalletId) + 1}` : t('autoArrange')}
                                </span>
                            </div>
                            `}
                        </div>
                    </div>
                    <div class="flex items-center gap-1 flex-shrink-0">
                        <button onclick="toggleEditBox(${b.id})" class="text-blue-400 hover:text-blue-600 p-1">
                            ${b.isEditing ? `
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                            ` : `
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                            `}
                        </button>
                        <button onclick="removeBoxType(${b.id})" class="text-red-400 hover:text-red-600 p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleEditBox(id) {
            const box = boxTypes.find(b => b.id === id);
            if (box) {
                box.isEditing = !box.isEditing;
                renderBoxList();
            }
        }

        function updatePalletVisuals(palletConfig) {
            if (!palletConfig) return;
            const pL = palletConfig.l;
            const pW = palletConfig.w;
            const pH = palletConfig.h;

            // Remove old
            if (palletMesh) scene.remove(palletMesh);

            // Create Pallet Geometry (Wood-like)
            const geometry = new THREE.BoxGeometry(pL, pH, pW);
            const material = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
            palletMesh = new THREE.Mesh(geometry, material);

            // Position: Center of pallet at (pL/2, pH/2, pW/2)
            palletMesh.position.set(pL / 2, pH / 2, pW / 2);
            palletMesh.castShadow = true;
            palletMesh.receiveShadow = true;

            scene.add(palletMesh);

            // Clear old boxes
            boxMeshes.forEach(m => scene.remove(m));
            boxMeshes = [];

            // Reset Camera target
            controls.target.set(pL / 2, Math.max(50, pH), pW / 2);
        }

        function resetScene() {
            allPalletsData = [];
            currentPalletIndex = 0;
            if (palletTypes.length > 0) {
                updatePalletVisuals(palletTypes[0]);
            }
            document.getElementById('resultsOverlay').classList.add('hidden');
        }

        // --- Multi-Pallet Logic ---
        function calculatePacking() {
            if (palletTypes.length === 0) {
                alert(t('errAddPalletFirst'));
                return;
            }
            if (boxTypes.length === 0) {
                alert(t('errAddBoxFirst'));
                return;
            }

            // 1. Flatten items
            let itemsToPack = [];
            boxTypes.forEach(type => {
                // Verify if assigned pallet still exists, otherwise reset to auto
                const isPalletValid = type.targetPalletId === "" || palletTypes.some(p => p.id.toString() === type.targetPalletId);
                const actualTargetId = isPalletValid ? type.targetPalletId : "";

                for (let i = 0; i < type.qty; i++) {
                    itemsToPack.push({ ...type, targetPalletId: actualTargetId, uuid: Math.random() });
                }
            });

            // 2. Sort (Largest Volume First)
            itemsToPack.sort((a, b) => (b.l * b.w * b.h) - (a.l * a.w * a.h));

            allPalletsData = [];
            let globalFailedItems = [];

            // Helper to pack exactly one pallet instance
            function packOnePalletInstance(itemsSubset, config) {
                let currentPalletPacked = [];
                let nextBatchItems = [];
                let anchorPoints = [{ x: 0, y: 0, z: 0 }];

                const palletL = config.l;
                const palletW = config.w;
                const availableMaxH = config.maxH - config.h;

                for (let i = 0; i < itemsSubset.length; i++) {
                    const item = itemsSubset[i];
                    let bestFit = null;

                    // Sort Anchors
                    anchorPoints.sort((a, b) => {
                        if (a.y !== b.y) return a.y - b.y;
                        if (a.z !== b.z) return a.z - b.z;
                        return a.x - b.x;
                    });

                    // Orientations logic
                    const dims = [item.l, item.w, item.h];
                    let allOrientations = [
                        { l: dims[0], w: dims[1], h: dims[2] },
                        { l: dims[0], w: dims[2], h: dims[1] },
                        { l: dims[1], w: dims[0], h: dims[2] },
                        { l: dims[1], w: dims[2], h: dims[0] },
                        { l: dims[2], w: dims[0], h: dims[1] },
                        { l: dims[2], w: dims[1], h: dims[0] }
                    ];

                    if (item.onlyUp) {
                        allOrientations = allOrientations.filter(o => Math.abs(o.h - item.h) < 0.001);
                    }

                    // De-dupe orientations
                    const uniqueOrientations = [];
                    const seenOrientations = new Set();
                    allOrientations.forEach(o => {
                        const key = `${o.l}-${o.w}-${o.h}`;
                        if (!seenOrientations.has(key)) {
                            seenOrientations.add(key);
                            uniqueOrientations.push(o);
                        }
                    });

                    // Helper functions for THIS pallet instance
                    const intersect = (b1, b2) => {
                        return !(b2.x >= b1.x + b1.l || b2.x + b2.l <= b1.x || b2.y >= b1.y + b1.h || b2.y + b2.h <= b1.y || b2.z >= b1.z + b1.w || b2.z + b2.w <= b1.z);
                    };

                    const isValidPos = (boxDim, x, y, z, currentPacked) => {
                        if (x + boxDim.l > palletL) return false;
                        if (z + boxDim.w > palletW) return false;
                        if (y + boxDim.h > availableMaxH) return false;

                        const candidateBox = { x, y, z, l: boxDim.l, w: boxDim.w, h: boxDim.h };
                        for (let other of currentPacked) {
                            if (intersect(candidateBox, other)) return false;
                        }

                        if (y > 0) {
                            let supported = false;
                            const cx = x + boxDim.l / 2;
                            const cz = z + boxDim.w / 2;
                            for (let other of currentPacked) {
                                if (Math.abs((other.y + other.h) - y) < 0.1) {
                                    if (cx >= other.x && cx <= other.x + other.l && cz >= other.z && cz <= other.z + other.w) {
                                        supported = true; break;
                                    }
                                }
                            }
                            if (!supported) return false;
                        }
                        return true;
                    };

                    // Find spot
                    for (let pt of anchorPoints) {
                        for (let orient of uniqueOrientations) {
                            if (isValidPos(orient, pt.x, pt.y, pt.z, currentPalletPacked)) {
                                bestFit = { x: pt.x, y: pt.y, z: pt.z, l: orient.l, w: orient.w, h: orient.h };
                                break;
                            }
                        }
                        if (bestFit) break;
                    }

                    if (bestFit) {
                        const packedBox = { ...item, ...bestFit };
                        currentPalletPacked.push(packedBox);
                        // New Anchors
                        anchorPoints.push({ x: bestFit.x, y: bestFit.y + bestFit.h, z: bestFit.z });
                        anchorPoints.push({ x: bestFit.x + bestFit.l, y: bestFit.y, z: bestFit.z });
                        anchorPoints.push({ x: bestFit.x, y: bestFit.y, z: bestFit.z + bestFit.w });
                    } else {
                        nextBatchItems.push(item);
                    }
                }

                return { packed: currentPalletPacked, remaining: nextBatchItems };
            }

            // Phase 1: Pack assigned items
            palletTypes.forEach(pType => {
                let assignedItems = itemsToPack.filter(item => item.targetPalletId === pType.id.toString());
                itemsToPack = itemsToPack.filter(item => item.targetPalletId !== pType.id.toString());

                while (assignedItems.length > 0) {
                    let result = packOnePalletInstance(assignedItems, pType);
                    if (result.packed.length === 0) {
                        globalFailedItems.push(...result.remaining);
                        break;
                    }
                    allPalletsData.push({
                        config: pType,
                        boxes: result.packed
                    });
                    assignedItems = result.remaining;
                }
            });

            // Phase 2: Pack remaining "Auto" items
            let palletIndex = 0;
            while (itemsToPack.length > 0) {
                const currentPalletConfig = palletIndex < palletTypes.length ? palletTypes[palletIndex] : palletTypes[palletTypes.length - 1];

                let result = packOnePalletInstance(itemsToPack, currentPalletConfig);

                if (result.packed.length === 0) {
                    globalFailedItems.push(...result.remaining);
                    break;
                }

                allPalletsData.push({
                    config: currentPalletConfig,
                    boxes: result.packed
                });
                itemsToPack = result.remaining; // Continue with remaining items for next pallet
                palletIndex++;
            }

            // 4. Results
            currentPalletIndex = 0;
            updateGlobalStats(allPalletsData.length, globalFailedItems.length);
            if (allPalletsData.length > 0) {
                renderPallet(0);
            } else {
                alert(t('errFailedPack'));
            }
        }

        function renderPallet(index) {
            if (index < 0 || index >= allPalletsData.length) return;

            const palletData = allPalletsData[index];
            const packedItems = palletData.boxes;
            const palletConfig = palletData.config;

            updatePalletVisuals(palletConfig);

            const geometryCache = {};

            packedItems.forEach(box => {
                const geoKey = `${box.l}-${box.h}-${box.w}`;
                if (!geometryCache[geoKey]) {
                    geometryCache[geoKey] = new THREE.BoxGeometry(box.l, box.h, box.w);
                }

                const material = new THREE.MeshStandardMaterial({
                    color: box.color,
                    transparent: true,
                    opacity: 0.85,
                    roughness: 0.4,
                    metalness: 0.1
                });

                const mesh = new THREE.Mesh(geometryCache[geoKey], material);
                mesh.position.set(
                    box.x + box.l / 2,
                    box.y + box.h / 2 + palletConfig.h,
                    box.z + box.w / 2
                );
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                const edges = new THREE.EdgesGeometry(geometryCache[geoKey]);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.3, transparent: true }));
                mesh.add(line);

                scene.add(mesh);
                boxMeshes.push(mesh);
            });

            updateCurrentPalletStats(index);
        }

        function updateGlobalStats(totalPallets, failedCount) {
            document.getElementById('resultsOverlay').classList.remove('hidden');
            document.getElementById('totalPalletsCount').innerText = totalPallets;
            document.getElementById('globalFailedCount').innerText = failedCount;
        }

        function updateCurrentPalletStats(index) {
            const palletData = allPalletsData[index];
            const packed = palletData.boxes;
            const palletConfig = palletData.config;
            const pL = palletConfig.l;
            const pW = palletConfig.w;
            const maxH = palletConfig.maxH;

            const maxStackH = packed.reduce((max, b) => Math.max(max, b.y + b.h), 0);
            const totalHeightWithPallet = maxStackH > 0 ? maxStackH + palletConfig.h : 0;
            const actualVol = packed.reduce((sum, b) => sum + (b.l * b.w * b.h), 0);
            const utilization = maxStackH > 0 ? ((actualVol / (pL * pW * (maxH - palletConfig.h))) * 100).toFixed(1) : 0;

            document.getElementById('currentPalletNum').innerText = index + 1;
            document.getElementById('resPacked').innerText = packed.length;
            document.getElementById('resHeight').innerText = totalHeightWithPallet.toFixed(1);
            document.getElementById('resVol').innerText = utilization + '%';

            // Update Buttons
            document.getElementById('prevPalletBtn').disabled = (index === 0);
            document.getElementById('nextPalletBtn').disabled = (index === allPalletsData.length - 1);
        }

        function switchPallet(direction) {
            const newIndex = currentPalletIndex + direction;
            if (newIndex >= 0 && newIndex < allPalletsData.length) {
                currentPalletIndex = newIndex;
                renderPallet(currentPalletIndex);
            }
        }

        function toggleSidebar() {
            const el = document.getElementById('sidebar');
            if (el.classList.contains('-translate-x-full')) {
                el.classList.remove('-translate-x-full');
            } else {
                el.classList.add('-translate-x-full');
            }
        }

        // Set initial language texts immediately before 3D init
        setLanguage('zh');

        init3D();

        // Add default pallet to avoid empty state issues at start
        document.getElementById('palletL').value = 120;
        document.getElementById('palletW').value = 100;
        document.getElementById('palletH').value = 15;
        document.getElementById('maxH').value = 200;
        addPalletType();

        addBoxType();

    </script>
</body>
